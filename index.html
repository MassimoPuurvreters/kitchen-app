<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuken App</title>
</head>
<body style="font-family:Arial; margin:20px">

<h2>🍳 Keuken App</h2>

<button onclick="addRecipe()">+ Recept</button>
<br><br>
Personen: <input type="number" value="4" id="people" onchange="render()">

<div id="app"></div>

<h3>🛒 Boodschappenlijst</h3>
<div id="list"></div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes") || "[]");

function save(){
  localStorage.setItem("recipes", JSON.stringify(recipes));
}

function addRecipe(){
  let name = prompt("Naam recept:");
  if(!name) return;
  recipes.push({name,ings:[],base:2,sel:true});
  save(); render();
}

function addIng(i){
  let name = prompt("Ingrediënt:");
  let amt = Number(prompt("Hoeveelheid:"));
  let unit = prompt("Eenheid:");
  recipes[i].ings.push({name,amt,unit});
  save(); render();
}

function render(){
  let p = document.getElementById("people").value;
  let html="";
  let totals={};

  recipes.forEach((r,i)=>{
    html += `<div style='border:1px solid #ccc;margin:10px;padding:10px;border-radius:10px'>
      <b>${r.name}</b>
      <input type='checkbox' ${r.sel?"checked":""} onchange='recipes[${i}].sel=!recipes[${i}].sel;save();render()'>
      <br><button onclick='addIng(${i})'>+ ingrediënt</button>
    `;

    r.ings.forEach(ing=>{
      let val = Math.round(ing.amt*(p/r.base)*4)/4;
      html += `<div>${ing.name}: ${val} ${ing.unit}</div>`;

      if(r.sel){
        let key = ing.name+" ("+ing.unit+")";
        totals[key]=(totals[key]||0)+val;
      }
    });

    html += "</div>";
  });

  document.getElementById("app").innerHTML = html;

  let listHTML="";
  for(let k in totals){
    listHTML += `<div>${k}: ${totals[k]}</div>`;
  }
  document.getElementById("list").innerHTML = listHTML;
}

render();
</script>

</body>
</html>
