<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keuken App</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { padding:15px; font-size:20px; font-weight:bold; background:white; }
.container { padding:10px; }
.card { background:white; padding:10px; margin-bottom:10px; border-radius:10px; }
button { padding:6px 10px; margin:2px; }
textarea { width:100%; height:100px; }
.nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:white; border-top:1px solid #ccc; }
.active { font-weight:bold; color:blue; }
</style>
</head>

<body>

<header>🍳 Keuken App</header>

<div class="container" id="app"></div>

<div class="nav">
  <button onclick="setTab('recept')" id="tab1">Recept</button>
  <button onclick="setTab('lijst')" id="tab2">Lijst</button>
</div>

<script>
let tab = "recept";
let people = 4;
let recipes = [];

function setTab(t){
  tab = t;
  render();
}

function addRecipe(){
  let name = prompt("Naam recept:");
  if(!name) return;
  recipes.push({name, ings:[], selected:true});
  render();
}

function importRecipe(){
  let name = prompt("Naam recept:");
  let text = document.getElementById("input").value;

  let lines = text.split("\\n");
  let ings = [];

  lines.forEach(line=>{
    let parts = line.trim().split(" ");
    if(parts.length >= 3){
      let n = parts[0];
      let amt = Number(parts[1]);
      let unit = parts[2];

      if(!isNaN(amt)){
        ings.push({name:n, portion:amt, unit:unit});
      }
    }
  });

  recipes.push({name, ings, selected:true});
  render();
}

function addIng(i){
  let n = prompt("Ingrediënt:");
  let amt = Number(prompt("Per persoon:"));
  let unit = prompt("Eenheid:");
  recipes[i].ings.push({name:n, portion:amt, unit:unit});
  render();
}

function editIng(i,j){
  let ing = recipes[i].ings[j];
  let n = prompt("Naam:", ing.name);
  let amt = Number(prompt("Per persoon:", ing.portion));
  let unit = prompt("Eenheid:", ing.unit);

  recipes[i].ings[j] = {name:n, portion:amt, unit:unit};
  render();
}

function deleteIng(i,j){
  recipes[i].ings.splice(j,1);
  render();
}

function deleteRecipe(i){
  if(confirm("Verwijderen?")){
    recipes.splice(i,1);
    render();
  }
}

function getList(){
  let totals = {};
  recipes.forEach(r=>{
    if(!r.selected) return;

    r.ings.forEach(i=>{
      let key = i.name + " ("+i.unit+")";
      let val = Math.round(i.portion * people * 4)/4;

      totals[key] = (totals[key] || 0) + val;
    });
  });
  return totals;
}

function render(){
  let el = document.getElementById("app");
  el.innerHTML = "";

  if(tab === "recept"){

    el.innerHTML += `
      <div class="card">
        Personen:
        <input type="number" value="${people}" onchange="people=this.value;render()">
      </div>

      <div class="card">
        <textarea id="input" placeholder="Rijst 100 g\nKip 150 g"></textarea>
        <button onclick="importRecipe()">Importeer recept</button>
      </div>
    `;

    recipes.forEach((r,i)=>{
      el.innerHTML += `
        <div class="card">
          <b>${r.name}</b>
          <button onclick="deleteRecipe(${i})">🗑</button>
          <br>
          <button onclick="addIng(${i})">+ ingrediënt</button>
      `;

      r.ings.forEach((ing,j)=>{
        let val = Math.round(ing.portion * people * 4)/4;

        el.innerHTML += `
          <div>
            ${ing.name}: ${val} ${ing.unit}
            <button onclick="editIng(${i},${j})">✏️</button>
            <button onclick="deleteIng(${i},${j})">❌</button>
          </div>
        `;
      });

      el.innerHTML += "</div>";
    });
  }

  if(tab === "lijst"){
    let list = getList();
    for(let k in list){
      el.innerHTML += `<div class="card">🛒 ${k}: ${list[k]}</div>`;
    }
  }

  document.getElementById("tab1").className = tab==="recept" ? "active" : "";
  document.getElementById("tab2").className = tab==="lijst" ? "active" : "";
}

render();
</script>

</body>
</html>
